# SOPS Configuration
# This file defines encryption rules for secrets in this repository.
#
# SETUP REQUIRED: Replace YOUR_AGE_PUBLIC_KEY_HERE with the actual age public key.
#
# To get the age public key on tachi:
#   sudo nix-shell -p ssh-to-age --run 'ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub'

keys:
  - &tachi age1cc0gzx3s2nf8uzy9m30phdxhf9llyzd25xfj2958g8funczevceqj4xgx4

creation_rules:
  - path_regex: secrets/system-secrets\.yaml$
    key_groups:
      - age:
          - *tachi
  - path_regex: secrets/comic-code-fonts\.tar\.gz$
    key_groups:
      - age:
          - *tachi
