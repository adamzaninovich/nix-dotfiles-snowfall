# SOPS Configuration
# This file defines encryption rules for secrets in this repository.
#
# Keys:
# - master: Stored in 1password, used for adding new hosts and reencryption
# - tachi: Host-specific key stored at ~/.config/sops/age/tachi.txt
# - wsl: Host-specific key stored at ~/.config/sops/age/wsl.txt
#
# When adding a new host, see secrets/README.md

keys:
  - &master age1x4nscwmglq7fxrzhyeqnw43tw5py0cl3gcedwmxwztvxfw3f6crq0kkj8g
  - &tachi age1xeq2p622qm5ftc7kl23welzvc3552ngqc82df8t947u696ysxgts0mddmt
  - &rocinante age13nu8e3vrjek227g7rjq8jqerzpeft7xwcs2zgxajpg8gztzggv4ses4v8h
  - &pallas age1s20cczctqy8w7l7frnpwfp70rdhz8r8ewm0t298q4vt8leyr7u6qnprs7a
  - &wsl age1dj7j53uh0nu25v0yxrfvgsufuzjqwpghtnusaguur56cv8522y2s27n0r0
  - &sgate age1xhfa53ky9xyerhzlc7esnrdnak2py8rpj2ln3agdr7lrv0qjk3dsp82tut

creation_rules:
  - path_regex: secrets/system-secrets\.yaml$
    key_groups:
      - age:
          - *master
          - *tachi
          - *rocinante
          - *pallas
          - *wsl
          - *sgate
  - path_regex: secrets/comic-code-fonts\.tar\.gz$
    key_groups:
      - age:
          - *master
          - *tachi
          - *rocinante
          - *pallas
          - *wsl
          - *sgate
  - path_regex: secrets/pallas-secrets\.yaml$
    key_groups:
      - age:
          - *master
          - *pallas
  - path_regex: secrets/doom-fonts\.tar\.gz$
    key_groups:
      - age:
          - *master
          - *tachi
          - *rocinante
          - *pallas
          - *wsl
          - *sgate
