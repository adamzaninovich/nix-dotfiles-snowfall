# SOPS Configuration
# This file defines encryption rules for secrets in this repository.
#
# Keys:
# - master: Stored in 1password, used for adding new hosts and reencryption
# - tachi: Host-specific key stored at ~/.config/sops/age/tachi.txt
#
# When adding a new host, see secrets/README.md

keys:
  - &master age1x4nscwmglq7fxrzhyeqnw43tw5py0cl3gcedwmxwztvxfw3f6crq0kkj8g
  - &tachi age1xeq2p622qm5ftc7kl23welzvc3552ngqc82df8t947u696ysxgts0mddmt
  - &rocinante age16pwujxqarhh3hrhcswrfv9vu332grxkh84dwy46qwtg495jxlpzqzrf4ea

creation_rules:
  - path_regex: secrets/system-secrets\.yaml$
    key_groups:
      - age:
          - *master
          - *tachi
          - *rocinante
  - path_regex: secrets/comic-code-fonts\.tar\.gz$
    key_groups:
      - age:
          - *master
          - *tachi
          - *rocinante
